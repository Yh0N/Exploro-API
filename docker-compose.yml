# EXPLORO: levantar API + Postgres juntos para que el host "db" exista en la red Docker.
#   docker compose up --build
# Si ejecutas solo la imagen de la API (p. ej. "Run" en Docker Desktop), NO habrá servicio "db"
# y fallará: could not translate host name "db". Solución: usar compose, o poner en .env
# POSTGRES_HOST=host.docker.internal y DATABASE_URL apuntando a tu Postgres en el puerto publicado.
version: "3.9"

services:

  db:
    image: postgis/postgis:15-3.3
    container_name: exploro_db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
#5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exploro_user -d exploro_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: exploro_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

volumes:
  postgres_data:
